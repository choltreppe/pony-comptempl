{% fun list(title: String, items: Array[String]) %}

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
</head>
<body>
  <ul>
    {% for item in items.values() %}
      <li>{{ item }}</li>
    {% end %}
  </ul>
</body>
</html>
